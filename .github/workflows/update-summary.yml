name: Update Shipping Industry Summary
 
on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:
 
jobs:
  update-summary:
    runs-on: ubuntu-latest
    permissions:
      contents: write
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
 
      - name: Install dependencies
        run: npm install @anthropic-ai/sdk
 
      - name: Generate and update summary
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          node << 'EOF'
          const Anthropic = require("@anthropic-ai/sdk");
          const fs = require("fs");
 
          const client = new Anthropic();
 
          async function main() {
            const today = new Date().toLocaleDateString("en-US", {
              year: "numeric",
              month: "long",
              day: "numeric"
            });
 
            const message = await client.messages.create({
              model: "claude-opus-4-6",
              max_tokens: 1500,
              messages: [
                {
                  role: "user",
                  content: `Generate a shipping industry summary for ${today}. Search for latest news on:
1. Regulatory changes (EU ETS, IMO, FuelEU Maritime)
2. Alternative fuels (methanol, ammonia, hydrogen)
3. Maritime tech innovations
4. Ship owner adoption trends
5. Major shipping industry developments
 
Create a 15-minute read summary with these HTML sections (use the exact format):
 
<h3 style="font-size: 0.95em; font-weight: 600; margin-bottom: 12px; color: #666;">Industry Summary (15-min read) - Updated ${today}</h3>
 
<div class="info-item">
<strong>The Big Picture</strong>
<p>[paragraph about current shipping landscape and regulations]</p>
</div>
 
<div class="info-item" style="margin-top: 12px;">
<strong>Regulatory Tailwinds</strong>
<p>[bullet points on regulations]</p>
</div>
 
<div class="info-item" style="margin-top: 12px;">
<strong>Market Dynamics</strong>
<p>[bullet points on market trends]</p>
</div>
 
<div class="info-item" style="margin-top: 12px;">
<strong>Alternative Fuels & Technology</strong>
<p>[bullet points on latest developments]</p>
</div>
 
<div class="info-item" style="margin-top: 12px;">
<strong>What to Watch</strong>
<p>[key focus areas for shipping industry]</p>
</div>
 
Make it relevant to maritime decarbonization and shipping optimization.`
                }
              ]
            });
 
            const summary = message.content[0].text;
            console.log("Generated summary:", summary);
 
            // Read the HTML file
            let html = fs.readFileSync("internship-hq.html", "utf-8");
 
            // Find and replace the industry summary section
            const summaryRegex = /<h3 style="font-size: 0\.95em; font-weight: 600; margin-bottom: 12px; color: #666;">Industry Summary[\s\S]*?<\/div>\s*<\/div>\s*<h3 style="font-size: 0\.95em; font-weight: 600; margin-bottom: 12px; color: #666; margin-top: 20px;">Key Concepts/;
 
            if (summaryRegex.test(html)) {
              html = html.replace(
                summaryRegex,
                summary + '\n\n<h3 style="font-size: 0.95em; font-weight: 600; margin-bottom: 12px; color: #666; margin-top: 20px;">Key Concepts'
              );
              fs.writeFileSync("internship-hq.html", html);
              console.log("Summary updated successfully");
            } else {
              console.log("Could not find summary section to replace");
              process.exit(1);
            }
          }
 
          main().catch((error) => {
            console.error("Error:", error);
            process.exit(1);
          });
          EOF
 
      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Shipping Summary Bot"
          git add internship-hq.html
          git commit -m "chore: update shipping industry summary - $(date +'%Y-%m-%d %H:%M')" || echo "No changes"
          git push
