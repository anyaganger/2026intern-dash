<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internship Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #f5f5f5;
            color: #333;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        .main-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 13px;
            opacity: 0.9;
        }

        .tabs {
            display: flex;
            background: white;
            border-bottom: 2px solid #e0e0e0;
            overflow-x: auto;
            padding: 0 30px;
        }

        .tab-button {
            padding: 16px 20px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: #666;
            border-bottom: 3px solid transparent;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .tab-button:hover {
            color: #667eea;
            background: #f9f9f9;
        }

        .tab-button.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .content {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        .tab-content {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .tab-content textarea {
            width: 100%;
            height: 100%;
            min-height: 400px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 14px;
            resize: none;
            background: white;
        }

        .tab-content textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .claude-panel {
            width: 380px;
            background: white;
            border-left: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
            box-shadow: -2px 0 8px rgba(0,0,0,0.08);
        }

        .claude-header {
            padding: 20px;
            border-bottom: 1px solid #e0e0e0;
            background: #fafafa;
            max-height: 200px;
            overflow-y: auto;
        }

        .claude-header h3 {
            font-size: 16px;
            margin-bottom: 12px;
        }

        .input-group {
            margin-bottom: 12px;
        }

        .input-group label {
            font-size: 11px;
            color: #666;
            display: block;
            margin-bottom: 4px;
            font-weight: 500;
        }

        .api-input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 12px;
            font-family: monospace;
        }

        .api-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .api-status {
            font-size: 11px;
            margin-top: 4px;
            color: #999;
        }

        .api-status.ready {
            color: #4caf50;
        }

        .api-status.error {
            color: #c33;
        }

        .sync-status {
            font-size: 11px;
            padding: 8px 12px;
            background: #f0f7ff;
            border-radius: 4px;
            color: #0066cc;
            text-align: center;
            margin-top: 8px;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            background: #f9f9f9;
        }

        .message {
            margin-bottom: 12px;
            display: flex;
            gap: 10px;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.assistant {
            justify-content: flex-start;
        }

        .message-bubble {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 13px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .message.user .message-bubble {
            background: #667eea;
            color: white;
        }

        .message.assistant .message-bubble {
            background: white;
            border: 1px solid #e0e0e0;
            color: #333;
        }

        .chat-input-area {
            padding: 15px;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 8px;
        }

        .chat-input {
            flex: 1;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 13px;
            resize: none;
            height: 38px;
            font-family: inherit;
        }

        .chat-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .send-button {
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 10px 14px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: background 0.3s;
        }

        .send-button:hover:not(:disabled) {
            background: #5568d3;
        }

        .send-button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .loading {
            text-align: center;
            color: #999;
            font-size: 12px;
            padding: 10px;
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 6px;
            font-size: 12px;
            margin-bottom: 10px;
        }

        @media (max-width: 1200px) {
            .claude-panel {
                width: 300px;
            }
        }

        @media (max-width: 900px) {
            .container {
                flex-direction: column;
            }

            .claude-panel {
                width: 100%;
                height: 250px;
                border-left: none;
                border-top: 1px solid #e0e0e0;
            }

            .claude-header {
                max-height: 80px;
            }

            .content {
                flex-direction: column;
            }

            .tab-content {
                flex: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="main-panel">
            <div class="header">
                <h1>Internship Dashboard</h1>
                <p>Track your responsibilities, learnings, and progress • Synced across devices</p>
            </div>

            <div class="tabs">
                <button class="tab-button active" data-tab="carbon-ridge">Carbon Ridge</button>
                <button class="tab-button" data-tab="maritime">Maritime Research</button>
                <button class="tab-button" data-tab="ai-finance">AI × Finance</button>
                <button class="tab-button" data-tab="networking">Networking</button>
                <button class="tab-button" data-tab="daily-notes">Daily Notes</button>
                <button class="tab-button" data-tab="questions">Questions</button>
                <button class="tab-button" data-tab="goals">Summer Goals</button>
            </div>

            <div class="content">
                <div id="carbon-ridge" class="tab-content active">
                    <textarea placeholder="Add your Carbon Ridge responsibilities, projects, and learnings here..."></textarea>
                </div>
                <div id="maritime" class="tab-content">
                    <textarea placeholder="Maritime research notes, industry insights, and key concepts..."></textarea>
                </div>
                <div id="ai-finance" class="tab-content">
                    <textarea placeholder="AI × Finance ideas, potential opportunities, and exploration..."></textarea>
                </div>
                <div id="networking" class="tab-content">
                    <textarea placeholder="Networking contacts, conversations, and relationship notes..."></textarea>
                </div>
                <div id="daily-notes" class="tab-content">
                    <textarea placeholder="Daily progress, observations, and reflections..."></textarea>
                </div>
                <div id="questions" class="tab-content">
                    <textarea placeholder="Questions to ask mentors, managers, and peers..."></textarea>
                </div>
                <div id="goals" class="tab-content">
                    <textarea placeholder="Summer goals, milestones, and success metrics..."></textarea>
                </div>
            </div>
        </div>

        <div class="claude-panel">
            <div class="claude-header">
                <h3>Claude Assistant</h3>

                <div class="input-group">
                    <label>Claude API Key</label>
                    <input type="password" class="api-input" id="apiKeyInput" placeholder="sk-ant-...">
                    <div class="api-status" id="apiStatus">Not set</div>
                </div>

                <div class="input-group">
                    <label>GitHub Token (for sync)</label>
                    <input type="password" class="api-input" id="githubTokenInput" placeholder="ghp_...">
                    <div class="api-status" id="githubStatus">Not set</div>
                </div>

                <div class="sync-status" id="syncStatus">
                    ℹ️ Add GitHub token to sync across devices
                </div>
            </div>

            <div class="chat-messages" id="chatMessages"></div>

            <div class="chat-input-area">
                <input type="text" class="chat-input" id="chatInput" placeholder="Ask about your internship..." disabled>
                <button class="send-button" id="sendButton" disabled>Send</button>
            </div>
        </div>
    </div>

    <script>
        // Configuration
        const GITHUB_REPO = 'anyaganger/2026intern-dash';
        const DASHBOARD_FILE = 'dashboard-data.json';

        // Tab switching
        const tabButtons = document.querySelectorAll('.tab-button');
        const tabContents = document.querySelectorAll('.tab-content');

        tabButtons.forEach(button => {
            button.addEventListener('click', () => {
                const tabId = button.getAttribute('data-tab');
                tabButtons.forEach(b => b.classList.remove('active'));
                tabContents.forEach(c => c.classList.remove('active'));
                button.classList.add('active');
                document.getElementById(tabId).classList.add('active');
            });
        });

        // API Keys
        const apiKeyInput = document.getElementById('apiKeyInput');
        const githubTokenInput = document.getElementById('githubTokenInput');
        const apiStatus = document.getElementById('apiStatus');
        const githubStatus = document.getElementById('githubStatus');
        const syncStatus = document.getElementById('syncStatus');
        const chatInput = document.getElementById('chatInput');
        const sendButton = document.getElementById('sendButton');

        let apiKey = localStorage.getItem('claude-api-key');
        let githubToken = localStorage.getItem('github-token');
        let conversationHistory = [];

        if (apiKey) {
            apiKeyInput.value = apiKey;
            updateApiStatus();
        }
        if (githubToken) {
            githubTokenInput.value = githubToken;
            updateGithubStatus();
        }

        apiKeyInput.addEventListener('change', (e) => {
            apiKey = e.target.value.trim();
            if (apiKey) {
                localStorage.setItem('claude-api-key', apiKey);
                updateApiStatus();
            }
        });

        githubTokenInput.addEventListener('change', (e) => {
            githubToken = e.target.value.trim();
            if (githubToken) {
                localStorage.setItem('github-token', githubToken);
                updateGithubStatus();
                loadFromGithub();
            }
        });

        function updateApiStatus() {
            if (apiKey) {
                apiStatus.textContent = '✓ Connected';
                apiStatus.classList.add('ready');
                enableChat();
            } else {
                apiStatus.textContent = 'Not set';
                apiStatus.classList.remove('ready');
                disableChat();
            }
        }

        function updateGithubStatus() {
            if (githubToken) {
                githubStatus.textContent = '✓ Syncing';
                githubStatus.classList.add('ready');
                syncStatus.textContent = '✓ Changes will sync to all devices';
            } else {
                githubStatus.textContent = 'Not set';
                githubStatus.classList.remove('ready');
                syncStatus.textContent = 'ℹ️ Add GitHub token to sync across devices';
            }
        }

        function enableChat() {
            chatInput.disabled = false;
            sendButton.disabled = false;
        }

        function disableChat() {
            chatInput.disabled = true;
            sendButton.disabled = true;
        }

        // Load all textareas
        const textareas = document.querySelectorAll('textarea');

        // Load from GitHub on startup
        async function loadFromGithub() {
            if (!githubToken) return;

            try {
                const response = await fetch(
                    `https://api.github.com/repos/${GITHUB_REPO}/contents/${DASHBOARD_FILE}`,
                    {
                        headers: {
                            'Authorization': `token ${githubToken}`,
                            'Accept': 'application/vnd.github.v3.raw'
                        }
                    }
                );

                if (response.ok) {
                    const data = await response.json();
                    Object.entries(data).forEach(([tabId, content]) => {
                        const textarea = document.getElementById(tabId)?.querySelector('textarea');
                        if (textarea) {
                            textarea.value = content;
                            localStorage.setItem(`dashboard-${tabId}`, content);
                        }
                    });
                    syncStatus.textContent = '✓ Loaded from cloud';
                }
            } catch (error) {
                console.error('Failed to load from GitHub:', error);
            }
        }

        // Auto-save to GitHub
        let saveTimeout;
        async function saveToGithub() {
            if (!githubToken) return;

            const data = {};
            textareas.forEach(textarea => {
                const tabId = textarea.parentElement.id;
                data[tabId] = textarea.value;
            });

            try {
                // Get current file SHA for update
                const getResponse = await fetch(
                    `https://api.github.com/repos/${GITHUB_REPO}/contents/${DASHBOARD_FILE}`,
                    {
                        headers: {
                            'Authorization': `token ${githubToken}`
                        }
                    }
                );

                let sha = null;
                if (getResponse.ok) {
                    const fileData = await getResponse.json();
                    sha = fileData.sha;
                }

                // Upload/update file
                const uploadResponse = await fetch(
                    `https://api.github.com/repos/${GITHUB_REPO}/contents/${DASHBOARD_FILE}`,
                    {
                        method: 'PUT',
                        headers: {
                            'Authorization': `token ${githubToken}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            message: `Update dashboard - ${new Date().toLocaleString()}`,
                            content: btoa(JSON.stringify(data, null, 2)),
                            sha: sha
                        })
                    }
                );

                if (uploadResponse.ok) {
                    syncStatus.textContent = '✓ Synced just now';
                }
            } catch (error) {
                console.error('Failed to save to GitHub:', error);
                syncStatus.textContent = '⚠ Sync failed - check token';
            }
        }

        // Setup auto-save
        textareas.forEach(textarea => {
            const tabId = textarea.parentElement.id;

            // Load from localStorage
            const saved = localStorage.getItem(`dashboard-${tabId}`);
            if (saved) textarea.value = saved;

            // Save on change
            textarea.addEventListener('input', () => {
                localStorage.setItem(`dashboard-${tabId}`, textarea.value);
                clearTimeout(saveTimeout);
                saveTimeout = setTimeout(saveToGithub, 2000);
            });

            textarea.addEventListener('blur', () => {
                localStorage.setItem(`dashboard-${tabId}`, textarea.value);
                saveToGithub();
            });
        });

        // Claude API Integration
        function getDashboardContext() {
            let context = 'Dashboard contents:\n\n';
            textareas.forEach(textarea => {
                const tabId = textarea.parentElement.id;
                const tabName = document.querySelector(`[data-tab="${tabId}"]`).textContent;
                const content = textarea.value;
                if (content.trim()) {
                    context += `## ${tabName}\n${content}\n\n`;
                }
            });
            return context;
        }

        async function sendMessage() {
            const message = chatInput.value.trim();
            if (!message || !apiKey) return;

            addMessageToChat('user', message);
            chatInput.value = '';
            sendButton.disabled = true;

            conversationHistory.push({
                role: 'user',
                content: message
            });

            try {
                const context = getDashboardContext();
                const systemPrompt = `You are a helpful assistant for an intern. You have access to their dashboard which contains information about their internship, responsibilities, and notes. Use this context to answer their questions accurately and helpfully.\n\n${context}`;

                const response = await fetch('https://api.anthropic.com/v1/messages', {
                    method: 'POST',
                    headers: {
                        'x-api-key': apiKey,
                        'anthropic-version': '2023-06-01',
                        'content-type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: 'claude-opus-4-6',
                        max_tokens: 1000,
                        system: systemPrompt,
                        messages: conversationHistory
                    })
                });

                if (!response.ok) {
                    throw new Error(`API error: ${response.status}`);
                }

                const data = await response.json();
                const assistantMessage = data.content[0].text;

                addMessageToChat('assistant', assistantMessage);
                conversationHistory.push({
                    role: 'assistant',
                    content: assistantMessage
                });
            } catch (error) {
                addMessageToChat('error', `Error: ${error.message}`);
            } finally {
                sendButton.disabled = false;
                chatInput.focus();
            }
        }

        function addMessageToChat(role, text) {
            const chatMessages = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;

            if (role === 'error') {
                messageDiv.innerHTML = `<div class="error">${text}</div>`;
            } else {
                const bubble = document.createElement('div');
                bubble.className = 'message-bubble';
                bubble.textContent = text;
                messageDiv.appendChild(bubble);
            }

            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        sendButton.addEventListener('click', sendMessage);
        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Initialize
        updateApiStatus();
        updateGithubStatus();
        loadFromGithub();
    </script>
</body>
</html>
